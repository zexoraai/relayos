<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>RelayOS Packer Login</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background: linear-gradient(135deg, #fefdfb 0%, #fdf8f0 50%, #faf3e8 100%); min-height: 100vh; }
  .card { background: #fff; border-radius: 24px; box-shadow: 0 12px 40px rgba(0,0,0,.08); }
</style>
</head>
<body class="text-gray-900 antialiased">
<div class="min-h-screen flex items-center justify-center p-4">
  <div class="card w-full max-w-md p-8">
    <div class="mb-6">
      <h1 class="text-2xl font-bold mb-1">Packer login</h1>
      <p class="text-sm text-gray-500" id="invite-blurb">Welcome back.</p>
    </div>
    <form id="login-form" class="space-y-3">
      <div>
        <label class="block text-xs text-gray-500 uppercase tracking-wide mb-1">Email</label>
        <input id="email" type="email" required class="w-full px-3 py-2.5 bg-gray-100 rounded-xl text-sm border-0 focus:ring-2 focus:ring-amber-400">
      </div>
      <div>
        <label class="block text-xs text-gray-500 uppercase tracking-wide mb-1">Password</label>
        <input id="password" type="password" required class="w-full px-3 py-2.5 bg-gray-100 rounded-xl text-sm border-0 focus:ring-2 focus:ring-amber-400">
      </div>
      <button id="submit-btn" type="submit" class="w-full py-3 mt-2 bg-amber-400 hover:bg-amber-500 text-gray-900 font-semibold rounded-full text-sm transition-all">Log in</button>
      <div id="error" class="hidden text-xs text-red-600 bg-red-50 rounded-lg p-3"></div>
    </form>
    <p class="text-xs text-gray-500 mt-6 text-center">No account yet? <a href="/packer-signup" class="text-amber-600 font-semibold">Sign up</a></p>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const inviteToken = params.get('token');
if (inviteToken) {
  document.getElementById('invite-blurb').textContent =
    'You have a pending invite. Log in to accept it.';
  // Stash for post-login accept
  sessionStorage.setItem('pendingInviteToken', inviteToken);
}

const form = document.getElementById('login-form');
const errorEl = document.getElementById('error');
const submitBtn = document.getElementById('submit-btn');

form.addEventListener('submit', async (ev) => {
  ev.preventDefault();
  errorEl.classList.add('hidden');
  submitBtn.disabled = true;
  submitBtn.textContent = 'Signing in...';

  try {
    const res = await fetch('/packer-auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value,
      }),
    });
    const data = await res.json();
    if (!res.ok || !data.success) {
      errorEl.textContent = data?.error?.message || 'Login failed';
      errorEl.classList.remove('hidden');
      return;
    }
    localStorage.setItem('packerToken', data.data.token);

    // If we arrived via an invite link, accept the invite immediately
    // so the link is active before the dashboard loads.
    const pending = sessionStorage.getItem('pendingInviteToken');
    if (pending) {
      sessionStorage.removeItem('pendingInviteToken');
      try {
        await fetch('/packer-auth/accept', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: 'Bearer ' + data.data.token,
          },
          body: JSON.stringify({ invite_token: pending }),
        });
      } catch {}
    }
    window.location.href = '/packer/dashboard';
  } catch (e) {
    errorEl.textContent = e.message || 'Network error';
    errorEl.classList.remove('hidden');
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = 'Log in';
  }
});
</script>
</body>
</html>
