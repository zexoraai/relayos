<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Kwikstix Fixer · Sign up</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans: ['Plus Jakarta Sans', 'system-ui', 'sans-serif'] },
        colors: {
          brand: { 50: '#fefce8', 100: '#fef9c3', 200: '#fef08a', 300: '#fde047', 400: '#facc15', 500: '#eab308', 600: '#ca8a04', 700: '#a16207' },
          surface: { 50: '#fefdfb', 100: '#fdf8f0', 200: '#faf3e8', 300: '#f5ede0' },
          dark: { 800: '#1c1c1e', 900: '#141416' }
        },
        borderRadius: { '2xl': '1rem', '3xl': '1.25rem', '4xl': '1.5rem' },
        boxShadow: {
          'card': '0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.02)',
          'card-hover': '0 10px 40px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04)',
          'elevated': '0 20px 60px rgba(0,0,0,0.1), 0 4px 16px rgba(0,0,0,0.05)',
        }
      }
    }
  }
</script>
<style>
  * { -webkit-font-smoothing: antialiased; }
  body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; background: linear-gradient(135deg, #fefdfb 0%, #fdf8f0 50%, #faf3e8 100%); min-height: 100vh; }
</style>
</head>
<body class="text-gray-900 antialiased">
<div class="min-h-screen flex items-center justify-center p-4">
  <div class="bg-white rounded-3xl shadow-elevated w-full max-w-md p-8">
    <div class="mb-6">
      <h1 class="text-2xl font-bold mb-1">Fixer signup</h1>
      <p class="text-sm text-gray-500" id="invite-blurb">Create your independent Kwikfixer account.</p>
    </div>

    <form id="signup-form" class="space-y-3">
      <div>
        <label class="block text-xs text-gray-500 uppercase tracking-wide mb-1 font-semibold">Email</label>
        <input id="email" type="email" required class="w-full px-3 py-2.5 bg-surface-100 rounded-xl text-sm border-0 focus:ring-2 focus:ring-brand-400">
      </div>
      <div>
        <label class="block text-xs text-gray-500 uppercase tracking-wide mb-1 font-semibold">Password</label>
        <input id="password" type="password" required minlength="8" class="w-full px-3 py-2.5 bg-surface-100 rounded-xl text-sm border-0 focus:ring-2 focus:ring-brand-400">
        <p class="text-[11px] text-gray-400 mt-1">At least 8 characters.</p>
      </div>
      <div>
        <label class="block text-xs text-gray-500 uppercase tracking-wide mb-1 font-semibold">Full name</label>
        <input id="full_name" class="w-full px-3 py-2.5 bg-surface-100 rounded-xl text-sm border-0 focus:ring-2 focus:ring-brand-400">
      </div>
      <div>
        <label class="block text-xs text-gray-500 uppercase tracking-wide mb-1 font-semibold">Business name <span class="text-gray-400 normal-case font-normal">(optional)</span></label>
        <input id="business_name" class="w-full px-3 py-2.5 bg-surface-100 rounded-xl text-sm border-0 focus:ring-2 focus:ring-brand-400">
      </div>
      <div>
        <label class="block text-xs text-gray-500 uppercase tracking-wide mb-1 font-semibold">Phone <span class="text-gray-400 normal-case font-normal">(optional)</span></label>
        <input id="phone" placeholder="+27..." class="w-full px-3 py-2.5 bg-surface-100 rounded-xl text-sm border-0 focus:ring-2 focus:ring-brand-400">
      </div>
      <button id="submit-btn" type="submit" class="w-full py-3 mt-2 bg-brand-400 hover:bg-brand-500 text-gray-900 font-semibold rounded-full text-sm transition-all">Create account</button>
      <div id="error" class="hidden text-xs text-red-600 bg-red-50 rounded-lg p-3"></div>
    </form>

    <p class="text-xs text-gray-500 mt-6 text-center">Already have an account? <a href="/packer-login" class="text-brand-600 font-semibold hover:underline">Log in</a></p>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const inviteToken = params.get('token');
if (inviteToken) {
  document.getElementById('invite-blurb').textContent =
    'You have been invited to join a tenant. Create your account to accept the invite.';
}

const form = document.getElementById('signup-form');
const errorEl = document.getElementById('error');
const submitBtn = document.getElementById('submit-btn');

function showError(msg) {
  errorEl.textContent = msg;
  errorEl.classList.remove('hidden');
}

form.addEventListener('submit', async (ev) => {
  ev.preventDefault();
  errorEl.classList.add('hidden');
  submitBtn.disabled = true;
  submitBtn.textContent = 'Creating...';

  const body = {
    email: document.getElementById('email').value.trim(),
    password: document.getElementById('password').value,
    full_name: document.getElementById('full_name').value.trim() || undefined,
    business_name: document.getElementById('business_name').value.trim() || undefined,
    phone: document.getElementById('phone').value.trim() || undefined,
  };
  if (inviteToken) body.invite_token = inviteToken;

  try {
    const res = await fetch('/packer-auth/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (!res.ok || !data.success) {
      // If the email is already registered AND we have an invite
      // token, route them to login with the token preserved so the
      // accept flow happens after they sign in. Otherwise show the
      // server's error in place.
      if (res.status === 409 && inviteToken) {
        window.location.href = '/packer-login?token=' + encodeURIComponent(inviteToken);
        return;
      }
      showError(data?.error?.message || 'Signup failed');
      return;
    }
    // Stash token + redirect to dashboard
    localStorage.setItem('packerToken', data.data.token);
    window.location.href = '/packer/dashboard';
  } catch (e) {
    showError(e.message || 'Network error');
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = 'Create account';
  }
});
</script>
</body>
</html>
